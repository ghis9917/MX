name: mx
services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    image: mx-image
    platform: linux/amd64
    container_name: mx-container
    ports:
      - 8000:8000
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 600